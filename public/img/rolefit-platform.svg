<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">RoleFit Platform project graphic</title>
  <desc id="desc">Abstract dashboard graphic representing ATS ingestion, scoring, SQLite tracking, and resume automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101928"/>
      <stop offset="55%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3bc4e"/>
      <stop offset="100%" stop-color="#f09b1b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aa2ff"/>
      <stop offset="100%" stop-color="#4e73df"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="220" cy="180" r="210" fill="#f3bc4e" opacity="0.08"/>
  <circle cx="1370" cy="160" r="170" fill="#4e73df" opacity="0.12"/>
  <circle cx="1280" cy="820" r="240" fill="#f3bc4e" opacity="0.06"/>

  <rect x="120" y="120" width="1360" height="760" rx="34" fill="#0f1827" stroke="rgba(255,255,255,0.08)"/>
  <rect x="160" y="170" width="380" height="110" rx="24" fill="#152033" stroke="#223149"/>
  <text x="200" y="218" fill="#edf1f7" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">RoleFit Platform</text>
  <text x="200" y="255" fill="#b5bdca" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="24">ATS ingestion • scoring • SQLite • resume workflows</text>

  <rect x="160" y="330" width="420" height="470" rx="28" fill="#131f31" stroke="#223149"/>
  <text x="200" y="390" fill="#f3bc4e" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Scoring Pipeline</text>
  <rect x="200" y="430" width="340" height="58" rx="16" fill="#1a2740"/>
  <text x="228" y="468" fill="#edf1f7" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="22">Greenhouse / Lever feeds</text>
  <rect x="200" y="515" width="340" height="58" rx="16" fill="#1a2740"/>
  <text x="228" y="553" fill="#edf1f7" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="22">Role scoring + classification</text>
  <rect x="200" y="600" width="340" height="58" rx="16" fill="#1a2740"/>
  <text x="228" y="638" fill="#edf1f7" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="22">Resume match + tailoring</text>
  <rect x="200" y="685" width="340" height="58" rx="16" fill="#1a2740"/>
  <text x="228" y="723" fill="#edf1f7" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="22">SQLite tracker + export</text>

  <rect x="640" y="330" width="360" height="470" rx="28" fill="#131f31" stroke="#223149"/>
  <text x="680" y="390" fill="#7aa2ff" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Ranking Signals</text>
  <rect x="680" y="430" width="280" height="20" rx="10" fill="#223149"/>
  <rect x="680" y="430" width="236" height="20" rx="10" fill="url(#gold)"/>
  <text x="680" y="482" fill="#edf1f7" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="22">Backend / platform fit</text>
  <rect x="680" y="525" width="280" height="20" rx="10" fill="#223149"/>
  <rect x="680" y="525" width="214" height="20" rx="10" fill="url(#blue)"/>
  <text x="680" y="577" fill="#edf1f7" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="22">Distributed systems</text>
  <rect x="680" y="620" width="280" height="20" rx="10" fill="#223149"/>
  <rect x="680" y="620" width="194" height="20" rx="10" fill="url(#gold)"/>
  <text x="680" y="672" fill="#edf1f7" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="22">CI/CD + validation</text>
  <rect x="680" y="715" width="280" height="20" rx="10" fill="#223149"/>
  <rect x="680" y="715" width="172" height="20" rx="10" fill="url(#blue)"/>
  <text x="680" y="767" fill="#edf1f7" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="22">Infra automation</text>

  <rect x="1060" y="330" width="380" height="470" rx="28" fill="#131f31" stroke="#223149"/>
  <text x="1100" y="390" fill="#f3bc4e" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Local Dashboard</text>
  <rect x="1100" y="430" width="300" height="220" rx="22" fill="#0d1726" stroke="#223149"/>
  <rect x="1130" y="465" width="95" height="95" rx="18" fill="#1b2a43"/>
  <rect x="1252" y="465" width="118" height="26" rx="13" fill="url(#gold)"/>
  <rect x="1252" y="508" width="98" height="18" rx="9" fill="#314662"/>
  <rect x="1252" y="541" width="124" height="18" rx="9" fill="#314662"/>
  <rect x="1130" y="592" width="240" height="18" rx="9" fill="#314662"/>
  <text x="1140" y="778" fill="#b5bdca" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="22">Dependency-free UI for scoring,</text>
  <text x="1140" y="810" fill="#b5bdca" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="22">matching, tailoring, and export</text>
</svg>
